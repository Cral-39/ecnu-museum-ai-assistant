<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>华东师范大学博物馆 AI 导览台</title>
  <link rel="stylesheet" href="styles.css">
  <script src="locales.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <!-- 页面图标集中在 SVG sprite 中，业务按钮通过 app.js 按 id 引用。 -->
  <svg class="sprite" aria-hidden="true">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></symbol>
    <symbol id="i-chat" viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 4z"/><path d="M8 9h8M8 13h5"/></symbol>
    <symbol id="i-camera" viewBox="0 0 24 24"><path d="M4 8h4l2-3h4l2 3h4v11H4z"/><circle cx="12" cy="13.5" r="3.5"/></symbol>
    <symbol id="i-archive" viewBox="0 0 24 24"><path d="M4 5h16v4H4z"/><path d="M6 9v10h12V9"/><path d="M9 13h6"/></symbol>
    <symbol id="i-exhibit" viewBox="0 0 24 24"><path d="M5 20h14"/><path d="M7 20V6h10v14"/><path d="M9 8h6M9 12h6M9 16h4"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="i-map" viewBox="0 0 24 24"><path d="m9 18-5 2V6l5-2 6 2 5-2v14l-5 2z"/><path d="M9 4v14M15 6v14"/></symbol>
    <symbol id="i-bookmark" viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4z"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 17v-5"/><path d="M12 8h.01"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.9-1.1L14.3 3h-4.6l-.3 2.9A7 7 0 0 0 7.5 7l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.1l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.9 1.1l-.3 2.9h4.6l.3-2.9a7 7 0 0 0 1.9-1.1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1.1z"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M7 7l1 13h8l1-13"/><path d="M10 11v5M14 11v5"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24"><path d="M4 12 20 4l-5 16-3-7z"/><path d="m12 13 8-9"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 5 3.5 8.5 7 10 3.5-1.5 7-5 7-10V6z"/><path d="m9 12 2 2 4-5"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16 16 4 4"/></symbol>
    <symbol id="i-route" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M8 6h4a4 4 0 0 1 0 8H9a3 3 0 0 0 0 6h7"/></symbol>
  </svg>

  <div class="app">
    <aside class="sidebar" aria-label="游客端导航">
      <div class="brand brand-side">
        <img src="logo_museum_official.jpg" alt="华东师范大学博物馆馆徽">
        <div>
          <strong>博物馆导览台</strong>
          <span>游客服务</span>
        </div>
      </div>
      <nav class="nav" id="navList" aria-label="主要功能"></nav>
      <div class="side-links" id="sideLinks" aria-label="辅助入口"></div>
    </aside>

    <div class="page">
      <header class="topbar">
        <div class="brand">
          <img src="logo_museum_official.jpg" alt="华东师范大学博物馆馆徽">
          <div>
            <strong>华东师范大学博物馆</strong>
            <span>AI 导览台</span>
          </div>
        </div>

        <div class="top-actions">
          <button class="btn" type="button" id="newChatBtn"></button>
          <button class="btn" type="button" data-action="help"></button>
          <div class="lang" aria-label="语言切换">
            <button class="lang-btn is-active" type="button">中文</button>
            <button class="lang-btn" type="button">English</button>
          </div>
          <div class="avatar" aria-label="用户头像">访</div>
        </div>
      </header>

      <main class="main">
        <section class="home" aria-label="首页内容">
          <section class="hero" aria-labelledby="heroTitle">
            <div class="hero-copy">
              <p class="eyebrow">高校博物馆数字导览台</p>
              <h1 id="heroTitle">欢迎来到华东师范大学博物馆 AI 导览台</h1>
              <p class="hero-desc">你可以在这里查询馆藏知识、了解展览信息、咨询开放与预约事项，也可以上传图片尝试识别相关藏品。回答会尽量基于馆方资料生成，请以博物馆官方信息为准。</p>
            </div>
            <figure class="hero-image">
              <img src="ecnu_museum_top.jpg" alt="华东师范大学博物馆视觉图">
              <figcaption>馆藏知识、展览与参观服务入口</figcaption>
            </figure>
          </section>

          <section class="ask-box" aria-labelledby="askTitle">
            <label class="ask-label" for="questionInput" id="askTitle">
              向导览台提问
              <span>可咨询开放时间、预约方式、展览、藏品与参观路线</span>
            </label>
            <textarea id="questionInput" rows="3" placeholder="试着问：博物馆开放时间是什么？最近有哪些展览？镇馆藏品有哪些？"></textarea>
            <div class="ask-actions">
              <div class="tool-row">
                <input class="sr-only" id="imageUpload" type="file" accept="image/*">
                <button class="btn" type="button" id="uploadBtn"></button>
                <button class="btn" type="button" id="voiceBtn"></button>
                <button class="btn" type="button" id="clearBtn"></button>
              </div>
              <button class="btn primary" type="button" id="sendBtn"></button>
            </div>
            <div class="upload-note" id="uploadState" aria-live="polite"></div>
          </section>

          <section aria-labelledby="featureTitle">
            <div class="section-title">
              <div>
                <h2 id="featureTitle">请选择要办理的事项</h2>
                <p>选择事项后，可继续补充日期、关键词或图片。</p>
              </div>
            </div>
            <div class="cards" id="featureGrid"></div>
          </section>

          <section class="question-groups" id="questionGroups" aria-label="场景化推荐问题"></section>

          <p class="trust">
            <svg class="icon"><use href="#i-shield"></use></svg>
            <span>内容由 AI 基于馆方知识库生成，仅供参考；开放时间、预约规则等请以博物馆官方通知为准。</span>
          </p>
        </section>

        <aside class="chat" aria-label="导览对话区">
          <section class="chat-panel" aria-labelledby="chatTitle">
            <header class="chat-head">
              <div>
                <h2 id="chatTitle">导览对话</h2>
                <p>每次回答都会尽量标明馆方资料来源。</p>
              </div>
              <span class="badge"><svg class="icon"><use href="#i-shield"></use></svg>馆方资料优先</span>
            </header>
            <div class="chat-feed" id="chatFeed" aria-live="polite"></div>
          </section>
        </aside>
      </main>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
